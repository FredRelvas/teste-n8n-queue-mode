# =============================================================================
# n8n - Arquitetura Escalável com Modo Fila (Queue Mode)
# =============================================================================
# Componentes:
#   - postgres:   Banco de dados principal do n8n
#   - redis:      Broker de filas (Bull MQ)
#   - n8n-main:   Instância principal (editor + webhook receiver)
#   - n8n-worker-1..3: Workers que processam workflows
# =============================================================================

version: "3.8"

x-n8n-common: &n8n-common
  image: n8nio/n8n:latest
  restart: unless-stopped
  environment:
    # --- Banco de dados ---
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_PORT=5432
    - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
    - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8n_password}
    # --- Modo Fila (ESSENCIAL) ---
    - EXECUTIONS_MODE=queue
    - QUEUE_BULL_REDIS_HOST=redis
    - QUEUE_BULL_REDIS_PORT=6379
    - QUEUE_BULL_REDIS_DB=0
    # --- Configurações gerais ---
    - GENERIC_TIMEZONE=America/Sao_Paulo
    - N8N_LOG_LEVEL=info
    - N8N_METRICS=true
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - n8n-network

services:
  # ===========================================================================
  # POSTGRES - Armazenamento de workflows e execuções
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-n8n_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - n8n-network

  # ===========================================================================
  # REDIS - Broker de filas (Bull MQ)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    networks:
      - n8n-network

  # ===========================================================================
  # N8N MAIN - Editor + Webhook Receiver (NÃO executa workflows)
  # ===========================================================================
  n8n-main:
    <<: *n8n-common
    hostname: n8n-main
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8n_password}
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_DB=0
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_LOG_LEVEL=info
      - N8N_METRICS=true
      - N8N_EDITOR_BASE_URL=http://localhost:5678
      - WEBHOOK_URL=http://localhost:5678
    ports:
      - "5678:5678"
    volumes:
      - n8n_main_data:/home/node/.n8n
    networks:
      - n8n-network

  # ===========================================================================
  # N8N WORKERS - Processadores de workflows (escale conforme demanda)
  # ===========================================================================
  n8n-worker-1:
    <<: *n8n-common
    hostname: n8n-worker-1
    command: worker
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8n_password}
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_DB=0
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_LOG_LEVEL=info
      - N8N_METRICS=true
      - QUEUE_BULL_REDIS_TIMEOUT=60
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=5
      - N8N_ENCRYPTION_KEY=Wd2i627zV9Blq2GUCZ0O0Lhh+4tmluqV
    volumes:
      - n8n_worker1_data:/home/node/.n8n

  n8n-worker-2:
    <<: *n8n-common
    hostname: n8n-worker-2
    command: worker
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8n_password}
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_DB=0
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_LOG_LEVEL=info
      - N8N_METRICS=true
      - QUEUE_BULL_REDIS_TIMEOUT=60
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=5
      - N8N_ENCRYPTION_KEY=Wd2i627zV9Blq2GUCZ0O0Lhh+4tmluqV
    volumes:
      - n8n_worker2_data:/home/node/.n8n

  n8n-worker-3:
    <<: *n8n-common
    hostname: n8n-worker-3
    command: worker
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8n_password}
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_DB=0
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_LOG_LEVEL=info
      - N8N_METRICS=true
      - QUEUE_BULL_REDIS_TIMEOUT=60
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=5
      - N8N_ENCRYPTION_KEY=Wd2i627zV9Blq2GUCZ0O0Lhh+4tmluqV
    volumes:
      - n8n_worker3_data:/home/node/.n8n

  # ===========================================================================
  # REDIS INSIGHT - Interface web para monitorar filas (opcional)
  # Acesse em: http://localhost:5540
  # ===========================================================================
  redisinsight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    ports:
      - "5540:5540"
    networks:
      - n8n-network

volumes:
  postgres_data:
  redis_data:
  n8n_main_data:
  n8n_worker1_data:
  n8n_worker2_data:
  n8n_worker3_data:

networks:
  n8n-network:
    driver: bridge
